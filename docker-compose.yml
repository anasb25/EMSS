services:
  postgres:
    image: postgres:16-alpine
    container_name: emss-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: emss
      POSTGRES_PASSWORD: emss_password
      POSTGRES_DB: emss_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U emss -d emss_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
